<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Estivo Settimanale</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --green-mid: #b7e4c7;
    --amber: #f4a261;
    --amber-light: #fff3e0;
    --cream: #fefae0;
    --dark: #1b1b1b;
    --mid: #555;
    --muted: #888;
    --border: #e8e8e4;
    --white: #ffffff;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f6f8f5;
    color: var(--dark);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .nav-logo {
    color: #fff;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo span { font-size: 1.4rem; }
  .nav-tabs {
    display: flex;
    gap: 4px;
  }
  .nav-tab {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.75);
    font-size: 0.92rem;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .nav-tab:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-tab.active { background: rgba(255,255,255,0.18); color: #fff; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--green) 0%, #40916c 100%);
    color: white;
    padding: 3rem 2rem 2rem;
    text-align: center;
  }
  .hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.4rem; }
  .hero p { font-size: 1rem; opacity: 0.85; }
  .season-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 1rem;
  }

  /* WEEK GRID */
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    margin-bottom: 2.5rem;
  }
  .day-thumb {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.9rem 0.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .day-thumb:hover {
    border-color: var(--green-light);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .day-thumb.selected {
    border-color: var(--green);
    background: var(--green-pale);
  }
  .day-thumb .day-name {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--green);
    margin-bottom: 4px;
  }
  .day-thumb .day-meal {
    font-size: 0.72rem;
    color: var(--mid);
    line-height: 1.3;
  }
  .day-thumb .day-emoji {
    font-size: 1.5rem;
    margin-bottom: 4px;
    display: block;
  }

  /* MEAL CARD */
  .meal-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .meal-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 1.4rem 1.5rem 0.8rem;
  }
  .meal-card-meta .meal-day-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--green);
    margin-bottom: 4px;
  }
  .meal-card-meta h2 {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--dark);
  }
  .meal-tabs {
    display: flex;
    gap: 6px;
    padding: 0 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .meal-tab {
    background: var(--green-pale);
    border: none;
    color: var(--green);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .meal-tab:hover { background: var(--green-mid); }
  .meal-tab.active { background: var(--green); color: white; }

  .meal-detail { display: none; }
  .meal-detail.active { display: flex; flex-direction: column; }

  .meal-image-wrap {
    width: 100%;
    height: 240px;
    overflow: hidden;
    position: relative;
    background: var(--green-pale);
  }
  .meal-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s;
  }
  .meal-image-wrap:hover img { transform: scale(1.03); }
  .meal-image-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.45));
    padding: 1.2rem 1.4rem 1rem;
    color: white;
  }
  .meal-image-overlay h3 { font-size: 1.15rem; font-weight: 700; }
  .meal-image-overlay p { font-size: 0.82rem; opacity: 0.9; }

  .meal-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .meal-recipe, .meal-ingredients {
    padding: 1.4rem 1.5rem;
  }
  .meal-recipe {
    border-right: 1px solid var(--border);
  }
  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--green);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--green-pale);
  }

  .recipe-steps { list-style: none; }
  .recipe-steps li {
    display: flex;
    gap: 10px;
    font-size: 0.88rem;
    color: var(--mid);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .recipe-steps li .step-num {
    background: var(--green);
    color: white;
    border-radius: 50%;
    min-width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .ingredient-list { list-style: none; }
  .ingredient-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  .ingredient-list li:last-child { border-bottom: none; }
  .ingredient-list li .ing-name { color: var(--dark); }
  .ingredient-list li .ing-qty {
    color: var(--green);
    font-weight: 600;
    font-size: 0.82rem;
    background: var(--green-pale);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .add-to-list-btn {
    background: var(--green-pale);
    border: 1.5px solid var(--green-mid);
    color: var(--green);
    font-size: 0.85rem;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    margin: 1rem 1.5rem 1.2rem;
    width: calc(100% - 3rem);
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .add-to-list-btn:hover { background: var(--green); color: white; border-color: var(--green); }
  .add-to-list-btn.added { background: var(--green); color: white; border-color: var(--green); }

  /* LISTA SPESA */
  .spesa-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .spesa-header h2 { font-size: 1.3rem; font-weight: 700; }
  .spesa-header p { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: #1b4332; }
  .btn-secondary {
    background: var(--white);
    color: var(--mid);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--green); color: var(--green); }
  .btn-danger { background: #fee2e2; color: #dc2626; }
  .btn-danger:hover { background: #dc2626; color: white; }

  .spesa-body { padding: 1.5rem 2rem; }

  .spesa-empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .spesa-empty .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
  .spesa-empty h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--mid); }

  .spesa-section { margin-bottom: 1.5rem; }
  .spesa-section-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--green);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1.5px solid var(--green-pale);
  }
  .spesa-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .spesa-item:hover { background: var(--green-pale); border-color: var(--green-mid); }
  .spesa-item.checked { opacity: 0.5; }
  .spesa-item.checked .spesa-item-name { text-decoration: line-through; }
  .spesa-item-left { display: flex; align-items: center; gap: 10px; }
  .spesa-item-cb { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; }
  .spesa-item-name { font-size: 0.9rem; }
  .spesa-item-right { display: flex; align-items: center; gap: 10px; }
  .spesa-item-qty {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--green);
    background: var(--green-pale);
    padding: 2px 10px;
    border-radius: 10px;
  }
  .spesa-item-source {
    font-size: 0.72rem;
    color: var(--muted);
    font-style: italic;
  }
  .spesa-item-del {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 5px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .spesa-item-del:hover { background: #fee2e2; color: #dc2626; }

  .spesa-add-manual {
    background: var(--white);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem 1.2rem;
    margin-top: 1.5rem;
  }
  .spesa-add-manual h4 { font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; color: var(--mid); }
  .add-form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .add-form input, .add-form select {
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.15s;
    background: white;
    color: var(--dark);
  }
  .add-form input:focus, .add-form select:focus { border-color: var(--green); }
  .add-form input[name="nome"] { flex: 2; min-width: 130px; }
  .add-form input[name="qty"] { flex: 1; min-width: 80px; }
  .add-form select { flex: 1; min-width: 110px; }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--green);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 640px) {
    .week-grid { grid-template-columns: repeat(4, 1fr); }
    .meal-body { grid-template-columns: 1fr; }
    .meal-recipe { border-right: none; border-bottom: 1px solid var(--border); }
    .nav-logo span { display: none; }
    nav { padding: 0 1rem; }
    .container { padding: 1.5rem 1rem; }
    .spesa-header, .spesa-body { padding: 1.2rem 1rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><span>🌿</span> Menu Estivo</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('menu')">Menu settimana</button>
    <button class="nav-tab" onclick="showPage('spesa')">Lista spesa <span id="spesa-count" style="background:rgba(255,255,255,0.25);padding:2px 7px;border-radius:10px;font-size:0.78rem;margin-left:4px;display:none;">0</span></button>
  </div>
</nav>

<!-- PAGE: MENU -->
<div id="page-menu" class="page active">
  <div class="hero">
    <div class="season-badge">☀️ Estate 2025</div>
    <h1>Menu Pranzo & Cena</h1>
    <p>Ricette semplici e gustose per tutta la settimana · 3 persone</p>
  </div>
  <div class="container">
    <div class="week-grid" id="week-grid"></div>
    <div id="day-detail"></div>
  </div>
</div>

<!-- PAGE: SPESA -->
<div id="page-spesa" class="page">
  <div class="spesa-header">
    <div>
      <h2>🛒 Lista della spesa</h2>
      <p>Ingredienti per 3 persone · aggiunti dal menu</p>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="exportExcel()">⬇ Esporta Excel</button>
      <button class="btn btn-danger" onclick="clearList()">🗑 Svuota lista</button>
    </div>
  </div>
  <div class="spesa-body">
    <div id="spesa-content"></div>
    <div class="spesa-add-manual">
      <h4>➕ Aggiungi manualmente</h4>
      <div class="add-form">
        <input type="text" name="nome" placeholder="Nome ingrediente" id="manual-nome">
        <input type="text" name="qty" placeholder="Quantità" id="manual-qty">
        <select id="manual-cat">
          <option value="Altro">Categoria</option>
          <option value="Verdura & Frutta">Verdura & Frutta</option>
          <option value="Carne & Affettati">Carne & Affettati</option>
          <option value="Latticini & Uova">Latticini & Uova</option>
          <option value="Pasta & Cereali">Pasta & Cereali</option>
          <option value="Condimenti & Spezie">Condimenti & Spezie</option>
          <option value="Legumi">Legumi</option>
          <option value="Altro">Altro</option>
        </select>
        <button class="btn btn-primary" onclick="addManual()" style="padding:7px 16px;">Aggiungi</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let currentDay = 0;
let currentVariant = 'main'; // 'main' or 'alt'
let shoppingList = JSON.parse(localStorage.getItem('menuEstivoSpesa') || '[]');
let addedMeals = JSON.parse(localStorage.getItem('menuEstivoAdded') || '[]');

function saveData() {
  localStorage.setItem('menuEstivoSpesa', JSON.stringify(shoppingList));
  localStorage.setItem('menuEstivoAdded', JSON.stringify(addedMeals));
  updateSpesaCount();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'spesa') renderSpesa();
}

function updateSpesaCount() {
  const cnt = shoppingList.length;
  const el = document.getElementById('spesa-count');
  el.textContent = cnt;
  el.style.display = cnt > 0 ? 'inline' : 'none';
}

function renderWeekGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = MENU.map((d, i) => `
    <div class="day-thumb ${i === currentDay ? 'selected' : ''}" onclick="selectDay(${i})">
      <span class="day-emoji">${d.emoji}</span>
      <div class="day-name">${d.short}</div>
      <div class="day-meal">${d.main.name.split(' ').slice(0,3).join(' ')}…</div>
    </div>
  `).join('');
}

function selectDay(idx) {
  currentDay = idx;
  currentVariant = 'main';
  renderWeekGrid();
  renderDayDetail();
  document.getElementById('day-detail').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderDayDetail() {
  const d = MENU[currentDay];
  const meal = d[currentVariant];
  const mealKey = `${currentDay}-${currentVariant}`;
  const isAdded = addedMeals.includes(mealKey);

  document.getElementById('day-detail').innerHTML = `
    <div class="meal-card">
      <div class="meal-card-header">
        <div class="meal-card-meta">
          <div class="meal-day-label">${d.day} · ${currentVariant === 'main' ? 'Piatto principale' : 'Variante'}</div>
          <h2>${meal.name}</h2>
        </div>
      </div>
      <div class="meal-tabs">
        <button class="meal-tab ${currentVariant === 'main' ? 'active' : ''}" onclick="switchVariant('main')">
          ${d.emoji} Ricetta principale
        </button>
        <button class="meal-tab ${currentVariant === 'alt' ? 'active' : ''}" onclick="switchVariant('alt')">
          🔄 Variante
        </button>
      </div>
      <div class="meal-detail active">
        <div class="meal-image-wrap">
          <img src="${meal.img}" alt="${meal.name}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=800&auto=format&fit=crop'">
          <div class="meal-image-overlay">
            <h3>${meal.name}</h3>
            <p>${meal.desc}</p>
          </div>
        </div>
        <div class="meal-body">
          <div class="meal-recipe">
            <div class="section-label">Preparazione</div>
            <ul class="recipe-steps">
              ${meal.steps.map((s, i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}
            </ul>
          </div>
          <div class="meal-ingredients">
            <div class="section-label">Ingredienti · 3 persone</div>
            <ul class="ingredient-list">
              ${meal.ingredients.map(ing => `
                <li>
                  <span class="ing-name">${ing.name}</span>
                  <span class="ing-qty">${ing.qty}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>
        <button class="add-to-list-btn ${isAdded ? 'added' : ''}" onclick="addToList(${currentDay}, '${currentVariant}')">
          ${isAdded ? '✅ Ingredienti aggiunti alla lista' : '🛒 Aggiungi ingredienti alla lista spesa'}
        </button>
      </div>
    </div>
  `;
}

function switchVariant(v) {
  currentVariant = v;
  renderDayDetail();
}

function addToList(dayIdx, variant) {
  const mealKey = `${dayIdx}-${variant}`;
  const meal = MENU[dayIdx][variant];

  if (addedMeals.includes(mealKey)) {
    showToast('Ingredienti già nella lista!');
    return;
  }

  meal.ingredients.forEach(ing => {
    const source = `${MENU[dayIdx].day} (${variant === 'main' ? 'principale' : 'variante'})`;
    const existing = shoppingList.find(i => i.name.toLowerCase() === ing.name.toLowerCase());
    if (!existing) {
      shoppingList.push({
        id: Date.now() + Math.random(),
        name: ing.name,
        qty: ing.qty,
        cat: ing.cat,
        source: source,
        checked: false
      });
    }
  });

  addedMeals.push(mealKey);
  saveData();
  renderDayDetail();
  showToast(`✅ ${meal.ingredients.length} ingredienti aggiunti!`);
}

function renderSpesa() {
  const content = document.getElementById('spesa-content');
  if (shoppingList.length === 0) {
    content.innerHTML = `
      <div class="spesa-empty">
        <div class="empty-icon">🛒</div>
        <h3>Lista vuota</h3>
        <p>Vai al menu, seleziona un giorno e aggiungi gli ingredienti</p>
      </div>`;
    return;
  }

  const bycat = {};
  shoppingList.forEach(item => {
    if (!bycat[item.cat]) bycat[item.cat] = [];
    bycat[item.cat].push(item);
  });

  const catOrder = ['Verdura & Frutta', 'Carne & Affettati', 'Latticini & Uova', 'Pasta & Cereali', 'Legumi', 'Condimenti & Spezie', 'Altro'];
  const sorted = [...catOrder.filter(c => bycat[c]), ...Object.keys(bycat).filter(c => !catOrder.includes(c))];

  content.innerHTML = sorted.map(cat => `
    <div class="spesa-section">
      <div class="spesa-section-title">${cat}</div>
      ${bycat[cat].map(item => `
        <div class="spesa-item ${item.checked ? 'checked' : ''}" id="item-${item.id}">
          <div class="spesa-item-left">
            <input type="checkbox" class="spesa-item-cb" ${item.checked ? 'checked' : ''} onchange="toggleItem('${item.id}')">
            <span class="spesa-item-name">${item.name}</span>
          </div>
          <div class="spesa-item-right">
            <span class="spesa-item-qty">${item.qty}</span>
            <span class="spesa-item-source">${item.source || ''}</span>
            <button class="spesa-item-del" onclick="deleteItem('${item.id}')" title="Rimuovi">✕</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function toggleItem(id) {
  const item = shoppingList.find(i => String(i.id) === String(id));
  if (item) { item.checked = !item.checked; saveData(); renderSpesa(); }
}

function deleteItem(id) {
  shoppingList = shoppingList.filter(i => String(i.id) !== String(id));
  saveData();
  renderSpesa();
}

function clearList() {
  if (!confirm('Svuotare tutta la lista della spesa?')) return;
  shoppingList = [];
  addedMeals = [];
  saveData();
  renderSpesa();
}

function addManual() {
  const nome = document.getElementById('manual-nome').value.trim();
  const qty = document.getElementById('manual-qty').value.trim();
  const cat = document.getElementById('manual-cat').value;
  if (!nome) { showToast('Inserisci un nome!'); return; }
  shoppingList.push({ id: Date.now(), name: nome, qty: qty || '—', cat: cat, source: 'Manuale', checked: false });
  saveData();
  renderSpesa();
  document.getElementById('manual-nome').value = '';
  document.getElementById('manual-qty').value = '';
  showToast('Ingrediente aggiunto!');
}

function exportExcel() {
  if (shoppingList.length === 0) { showToast('Lista vuota!'); return; }
  const ws_data = [['Ingrediente', 'Quantità', 'Categoria', 'Dal pasto', 'Acquistato']];
  shoppingList.forEach(item => {
    ws_data.push([item.name, item.qty, item.cat, item.source || '', item.checked ? 'Sì' : 'No']);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(ws_data);

  ws['!cols'] = [{ wch: 30 }, { wch: 15 }, { wch: 20 }, { wch: 30 }, { wch: 12 }];

  const header_style = { font: { bold: true, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '2D6A4F' } }, alignment: { horizontal: 'center' } };
  ['A1','B1','C1','D1','E1'].forEach(cell => {
    if (ws[cell]) ws[cell].s = header_style;
  });

  XLSX.utils.book_append_sheet(wb, ws, 'Lista Spesa');
  XLSX.writeFile(wb, 'lista_spesa_menu_estivo.xlsx');
  showToast('✅ Excel scaricato!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// INIT
renderWeekGrid();
selectDay(0);
updateSpesaCount();
